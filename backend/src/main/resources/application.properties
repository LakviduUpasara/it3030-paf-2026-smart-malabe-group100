# Application Configuration
spring.application.name=smart-campus-backend
server.port=8082

# ===== H2 DATABASE CONFIGURATION =====
# Use in-memory database with persistent connection
spring.datasource.url=jdbc:h2:mem:smartcampus;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== DATASOURCE POOL CONFIGURATION =====
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# ===== JPA/HIBERNATE CONFIGURATION =====
# Create tables automatically on startup, keep them for subsequent restarts
spring.jpa.hibernate.ddl-auto=create
# Show generated SQL statements for debugging
spring.jpa.show-sql=true
# Format SQL output
spring.jpa.properties.hibernate.format_sql=true
# Use H2 dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# Enable JPA property validation
spring.jpa.properties.hibernate.generate_statistics=false
# Disable second-level cache
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# ===== H2 CONSOLE CONFIGURATION =====
# Enable H2 console web interface
spring.h2.console.enabled=true
# Set H2 console path
spring.h2.console.path=/h2-console
# Allow remote H2 console access
spring.h2.console.settings.web-allow-others=true  # UPDATED: Changed from false to true for dev access

# ===== DATABASE INITIALIZATION =====
# Allow SQL initialization scripts to run
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ===== TIMEZONE CONFIGURATION =====
spring.jackson.time-zone=Asia/Colombo
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Colombo

# ===== SECURITY CONFIGURATION =====
spring.security.user.name=admin
spring.security.user.password=admin