# Application Configuration
spring.application.name=smart-campus-backend
server.port=18080

# Default profile for local development (loads application-dev.properties: developer login, etc.).
# In production set SPRING_PROFILES_ACTIVE=prod (or another profile) and keep developer mode off.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Primary NoSQL datastore for signup, auth, and operational records.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smartcampus}
spring.data.mongodb.auto-index-creation=true

# Demo auth flow tuning.
app.auth.session-hours=12
app.auth.challenge-minutes=10
app.auth.dev-expose-otp=true
# When true, password login issues a session immediately (no OTP step). Set false in production.
app.auth.skip-two-factor=true

# Real Google Identity Services configuration.
app.auth.google.client-ids=${GOOGLE_CLIENT_IDS:}

# Local relational datastore defaults for JPA-backed modules (e.g. campus messages).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/smartcampus;MODE=MySQL;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Developer mode: NEVER enable in production. Enables POST /api/v1/auth/dev-login (email only),
# skips 2FA for all sign-in paths, and suppresses outbound OTP email. Password login still verifies the password.
app.developer-mode=${APP_DEVELOPER_MODE:false}

# When developer mode is off, email OTP can be sent (requires spring.mail.* below). When true, OTP is
# emailed instead of only logged (debug fields follow app.auth.dev-expose-otp).
app.notifications.email.enabled=${APP_NOTIFICATIONS_EMAIL_ENABLED:true}
app.notifications.email.from-address=${APP_NOTIFICATIONS_EMAIL_FROM:noreply@smartcampus.local}

# Optional SMTP (used when developer mode is false and app.notifications.email.enabled is true).
# spring.mail.host=smtp.example.com
