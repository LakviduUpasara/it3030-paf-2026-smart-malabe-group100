spring.application.name=smart-campus-backend
server.port=18080

# Primary NoSQL datastore for signup, auth, and operational records.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smartcampus}
spring.data.mongodb.auto-index-creation=true

# Demo auth flow tuning.
app.auth.session-hours=12
app.auth.challenge-minutes=10
app.auth.dev-expose-otp=true
# When true, password login issues a session immediately (no OTP step). Set false in production.
app.auth.skip-two-factor=true

# Real Google Identity Services configuration.
app.auth.google.client-ids=${GOOGLE_CLIENT_IDS:}

# Local relational datastore defaults for JPA-backed modules (e.g. campus messages).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/smartcampus;MODE=MySQL;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
