# Application Configuration
spring.application.name=smart-campus-backend
server.port=18080

# Default profile for local development (loads application-dev.properties: developer login, etc.).
# In production set SPRING_PROFILES_ACTIVE=prod (or another profile) and keep developer mode off.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Primary NoSQL datastore for signup, auth, and operational records.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smartcampus}
spring.data.mongodb.auto-index-creation=true

# Demo auth flow tuning.
app.auth.session-hours=12
# OTP challenge lifetime (email + verify window). Override with APP_AUTH_CHALLENGE_MINUTES.
app.auth.challenge-minutes=${APP_AUTH_CHALLENGE_MINUTES:10}
# Minimum seconds between email OTP sends (initial + resend). Override with APP_AUTH_OTP_RESEND_COOLDOWN_SECONDS.
app.auth.otp-resend-cooldown-seconds=${APP_AUTH_OTP_RESEND_COOLDOWN_SECONDS:60}
app.auth.first-login-setup-hours=4
# Never expose OTP in API responses in production. Set APP_AUTH_DEV_EXPOSE_OTP=true only for local testing without SMTP.
app.auth.dev-expose-otp=${APP_AUTH_DEV_EXPOSE_OTP:false}
# When true, password login issues a session immediately (no OTP step). Set false in production.
app.auth.skip-two-factor=${APP_AUTH_SKIP_TWO_FACTOR:false}
# Google Identity one-time sign-up session (Mongo). Increase for long multi-step flows.
app.auth.google.signup-session-minutes=60

# Real Google Identity Services configuration.
app.auth.google.client-ids=${GOOGLE_CLIENT_IDS:}

# Local relational datastore defaults for JPA-backed modules (e.g. campus messages).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/smartcampus;MODE=MySQL;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Developer mode: NEVER enable in production. Enables POST /api/v1/auth/dev-login (email only),
# skips 2FA for all sign-in paths, and suppresses outbound OTP email. Password login still verifies the password.
app.developer-mode=${APP_DEVELOPER_MODE:false}

# When developer mode is off, email OTP can be sent (requires spring.mail.* below). When true, OTP is
# emailed instead of only logged (debug fields follow app.auth.dev-expose-otp).
app.notifications.email.enabled=${APP_NOTIFICATIONS_EMAIL_ENABLED:true}
app.notifications.email.from-address=${APP_NOTIFICATIONS_EMAIL_FROM:noreply@smartcampus.local}

# SMTP — set credentials via SPRING_MAIL_* environment variables (or system properties from .env).
# The explicit bindings below are required because AppApplication loads .env via System.setProperty,
# which does NOT trigger Spring Boot's OS env-var relaxed binding (SPRING_MAIL_HOST → spring.mail.host).
# Do not commit real passwords.
# Gmail: use smtp.gmail.com, port 587, and an App Password (https://myaccount.google.com/apppasswords).
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
#
# Local testing (Mailpit/MailHog): SPRING_MAIL_HOST=127.0.0.1 SPRING_MAIL_PORT=1025 and disable auth/starttls for that server only.

# Staff / student registration (admin APIs under /api/v1/...).
app.registration.lecturer-email-domain=${LECTURER_EMAIL_DOMAIN:lecturer.smartcampus.local}
app.registration.lab-assistant-email-domain=${LAB_ASSISTANT_EMAIL_DOMAIN:lab.smartcampus.local}
app.registration.student-email-domain=${STUDENT_EMAIL_DOMAIN:student.smartcampus.local}
app.registration.default-staff-password=${DEFAULT_STAFF_PASSWORD:ChangeMe123!}
app.registration.generated-password-length=14
