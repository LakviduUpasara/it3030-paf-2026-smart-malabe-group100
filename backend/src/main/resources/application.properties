spring.application.name=smart-campus-backend
server.port=18081

# Primary NoSQL datastore for signup, auth, and operational records.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smartcampus}
spring.data.mongodb.auto-index-creation=true

# Demo auth flow tuning.
app.auth.session-hours=12
app.auth.challenge-minutes=10
app.auth.dev-expose-otp=true

# Real Google Identity Services configuration.
app.auth.google.client-ids=${GOOGLE_CLIENT_IDS:}
