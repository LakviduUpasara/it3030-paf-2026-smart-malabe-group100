# Local development profile: passwordless dev-login and no real 2FA email by default.
# Run: mvn spring-boot:run -Dspring-boot.run.arguments=--spring.profiles.active=dev
#
# Mongo URI comes from application.properties: ${MONGODB_URI:mongodb://localhost:27017/smartcampus}.
# Do not hardcode Atlas credentials here. For Atlas, set MONGODB_URI or SPRING_DATA_MONGODB_URI (same property).
# Start MongoDB locally (see backend/.env.example). If you see "bad auth", the username/password or auth DB in the URI is wrong.
spring.data.mongodb.auto-index-creation=true
logging.level.org.springframework.data.mongodb.core.MongoTemplate=INFO
logging.level.org.springframework=INFO

# Developer mode is strictly opt-in via APP_DEVELOPER_MODE in backend/.env.
# Default is OFF even with the 'dev' profile active, so sign-in always requires a real credential.
# Flip APP_DEVELOPER_MODE=true only on trusted local machines to enable POST /api/v1/auth/dev-login
# and bypass 2FA.
app.developer-mode=${APP_DEVELOPER_MODE:false}

# To test real Gmail OTP while using the dev profile, set in .env for example:
# APP_DEVELOPER_MODE=false
# SPRING_MAIL_HOST=smtp.gmail.com
# SPRING_MAIL_USERNAME=you@gmail.com
# SPRING_MAIL_PASSWORD=your-app-password
#
# If SMTP is off or misconfigured, the API may return the OTP in the login response (debugCode) so you can still sign in locally.
