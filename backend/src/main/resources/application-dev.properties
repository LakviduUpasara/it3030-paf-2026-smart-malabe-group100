# Use local MongoDB by default so a stale or invalid MONGODB_URI (e.g. from .env / Atlas) does not break startup.
# Start MongoDB locally (see backend/.env.example), or point at Atlas with correct credentials via:
#   SPRING_DATA_MONGODB_URI=mongodb+srv://...   (Spring Boot env binding; overrides this file)
spring.data.mongodb.uri=mongodb+srv://infofutureys_db_user:L6JxAoy076rxqpgw@lernhub.5qucpo6.mongodb.net/smartcampus
spring.data.mongodb.auto-index-creation=true
logging.level.org.springframework.data.mongodb.core.MongoTemplate=INFO
logging.level.org.springframework=INFO

# Matches APP_DEVELOPER_MODE=true: enables POST /api/v1/auth/dev-login and bypasses 2FA for local dev only.
app.developer-mode=true

