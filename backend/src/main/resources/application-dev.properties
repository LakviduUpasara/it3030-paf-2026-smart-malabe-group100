# Local development profile: passwordless dev-login and no real 2FA email by default.
# Run: mvn spring-boot:run -Dspring-boot.run.arguments=--spring.profiles.active=dev
spring.data.mongodb.auto-index-creation=true
logging.level.org.springframework.data.mongodb.core.MongoTemplate=INFO
logging.level.org.springframework=INFO

# Developer mode is strictly opt-in via APP_DEVELOPER_MODE in backend/.env.
# Default is OFF even with the 'dev' profile active, so sign-in always requires a real credential.
# Flip APP_DEVELOPER_MODE=true only on trusted local machines to enable POST /api/v1/auth/dev-login
# and bypass 2FA.
app.developer-mode=${APP_DEVELOPER_MODE:false}

# To test real Gmail OTP while using the dev profile, override developer mode and set SMTP env vars, e.g.:
# APP_DEVELOPER_MODE=false SPRING_MAIL_HOST=smtp.gmail.com SPRING_MAIL_USERNAME=you@gmail.com SPRING_MAIL_PASSWORD=app-password
#
# OTP is never shown in the UI; keep APP_AUTH_DEV_EXPOSE_OTP=false (default) so the API does not return debugCode either.
